<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Bomb Party Single Player</title>
</head>
<body>

<header><h1>Single Player Bomb Party</h1></header>

<div class="base">
    <div id="startContainer">
        <img id="image" src="https://crmto.org.br/wp-content/uploads/2024/06/user.png" alt="">
        <h4><i>player</i></h4>
        <button id="startButton">Jogar</button>
    </div>
    <div id="gameContainer" style="display: none">
        <h3 id="wordPrompt"></h3>

        <input type="text" id="inputWord" placeholder="..." autocomplete="off" spellcheck="false">

        <button id="sendButton">Enviar</button>
        <button id="skipButton">Game Over</button>

        <p id="lives">
            <i id="lifeOne" class="bi bi-heart-fill"></i>
            <i id="lifeTwo" class="bi bi-heart-fill"></i>
            <i id="lifeThree" class="bi bi-heart"></i>
        </p>

        <p><strong>Pontuação:</strong><span id="score">0</span></p>
        <p id="gameTime">0s</p>
    </div>
</div>
<div id="gameOverContainer" style="display: none">
    
    <h2><strong>Game Over</strong></h2>

    <p id="finalScore"></p>
    <h3 style="margin: 10px 10px 2px 10px">Pontuações mais altas:</h3>
    <ol id="highscores"></ol>

    <button id="returnButton">Voltar</button>
</div>
    
<script src="script.js"></script>
</body>
</html>
